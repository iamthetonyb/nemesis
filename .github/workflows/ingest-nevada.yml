name: Nevada Data Refresh

on:
  schedule:
    # Daily light refresh after USAspending's nightly pipeline window.
    # Runs federal baseline + Nevada state checkbook only; cheap and current.
    - cron: "17 10 * * 2-6"
    # Weekly full refresh across all configured connectors.
    - cron: "41 10 * * 1"
    # Monthly discovery watch for pending portals/dataset IDs.
    - cron: "23 11 2 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate only, do not commit or deploy"
        required: false
        default: "false"
      sources:
        description: "Comma-separated sources (state,las-vegas,ccsd,counties,districts), discovery, or empty = all"
        required: false
        default: ""

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ingest-nevada
  cancel-in-progress: false

jobs:
  ingest:
    name: Ingest + validate + deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.1"
          components: "clippy,rustfmt"

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Install backend deps (for any shared utilities)
        run: pnpm --dir backend install --frozen-lockfile

      - name: Audit backend prod deps
        run: pnpm --dir backend audit --prod --audit-level high

      - name: Plan refresh profile
        id: plan
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          INPUT_SOURCES="${{ github.event.inputs.sources || '' }}"
          INPUT_DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          PROFILE="manual"
          SOURCES="${INPUT_SOURCES:-all}"

          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "$SCHEDULE" in
              "17 10 * * 2-6")
                PROFILE="daily-light"
                SOURCES="state"
                ;;
              "41 10 * * 1")
                PROFILE="weekly-full"
                SOURCES="all"
                ;;
              "23 11 2 * *")
                PROFILE="monthly-discovery"
                SOURCES="discovery"
                ;;
              *)
                PROFILE="scheduled-full"
                SOURCES="all"
                ;;
            esac
          elif [ "$INPUT_SOURCES" = "discovery" ]; then
            PROFILE="manual-discovery"
            SOURCES="discovery"
          fi

          echo "SOURCE_PROFILE=$PROFILE" >> "$GITHUB_ENV"
          echo "REFRESH_SOURCES=$SOURCES" >> "$GITHUB_ENV"
          echo "DRY_RUN=$INPUT_DRY_RUN" >> "$GITHUB_ENV"
          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"
          echo "sources=$SOURCES" >> "$GITHUB_OUTPUT"
          echo "dry_run=$INPUT_DRY_RUN" >> "$GITHUB_OUTPUT"

          echo "Profile: $PROFILE"
          echo "Sources: $SOURCES"
          echo "Dry run: $INPUT_DRY_RUN"

      # --- Step 1: Regenerate federal baseline from USAspending + TIGERweb ---
      # This always runs first — creates the authoritative base bootstrap.json.
      # Ingest steps below then augment it with additional state/local sources.

      - name: Generate federal baseline (USAspending + TIGERweb)
        if: ${{ env.REFRESH_SOURCES != 'discovery' }}
        run: pnpm generate:nevada

      # --- Step 2: Augment with state / local sources ---
      # Each step reads the existing bootstrap.json and merges its data in.
      # Failures are non-fatal; the validate step below is the hard gate.

      - name: Ingest — Nevada state checkbook
        if: ${{ env.REFRESH_SOURCES != 'discovery' && (env.REFRESH_SOURCES == 'all' || contains(env.REFRESH_SOURCES, 'state')) }}
        run: node tools/ingest/nevada-state-checkbook.mjs

      - name: Ingest — Las Vegas city checkbook
        if: ${{ env.REFRESH_SOURCES != 'discovery' && (env.REFRESH_SOURCES == 'all' || contains(env.REFRESH_SOURCES, 'las-vegas')) }}
        run: node tools/ingest/nevada-las-vegas.mjs
        continue-on-error: true

      - name: Ingest — Clark County School District
        if: ${{ env.REFRESH_SOURCES != 'discovery' && (env.REFRESH_SOURCES == 'all' || contains(env.REFRESH_SOURCES, 'ccsd')) }}
        run: node tools/ingest/nevada-ccsd.mjs
        continue-on-error: true

      - name: Ingest — County ACFR/portal data
        if: ${{ env.REFRESH_SOURCES != 'discovery' && (env.REFRESH_SOURCES == 'all' || contains(env.REFRESH_SOURCES, 'counties')) }}
        run: node tools/ingest/nevada-counties.mjs
        continue-on-error: true

      - name: Ingest — Special districts
        if: ${{ env.REFRESH_SOURCES != 'discovery' && (env.REFRESH_SOURCES == 'all' || contains(env.REFRESH_SOURCES, 'districts')) }}
        run: node tools/ingest/nevada-districts.mjs
        continue-on-error: true

      - name: Discover source portals
        if: ${{ env.REFRESH_SOURCES == 'discovery' }}
        run: pnpm discover:sources

      - name: Upload source discovery report
        if: ${{ env.REFRESH_SOURCES == 'discovery' }}
        uses: actions/upload-artifact@v4
        with:
          name: source-discovery-report
          path: docs/source-discovery-report.md
          if-no-files-found: error

      # --- Rust validation gate — this is the hard gate ---
      # If this fails, we do not commit or deploy.

      - name: Validate bootstrap.json (Rust gate)
        if: ${{ env.REFRESH_SOURCES != 'discovery' }}
        run: pnpm validate:data

      - name: Check data freshness
        if: ${{ env.REFRESH_SOURCES != 'discovery' }}
        run: pnpm check:freshness

      - name: Generate sitemap
        if: ${{ env.REFRESH_SOURCES != 'discovery' }}
        run: pnpm sitemap

      - name: Generate public artifact manifest
        if: ${{ env.REFRESH_SOURCES != 'discovery' }}
        run: pnpm manifest

      - name: Verify public artifact manifest
        if: ${{ env.REFRESH_SOURCES != 'discovery' }}
        run: cargo run -q -p spending-validate -- frontend/data/bootstrap.json frontend/data/manifest.json

      # --- Commit and push if data changed ---

      - name: Check for changes
        if: ${{ env.REFRESH_SOURCES != 'discovery' }}
        id: diff
        run: |
          git diff --quiet frontend/data/bootstrap.json frontend/data/manifest.json frontend/sitemap.xml && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated data
        if: ${{ env.REFRESH_SOURCES != 'discovery' && steps.diff.outputs.changed == 'true' && env.DRY_RUN != 'true' }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add frontend/data/bootstrap.json frontend/data/manifest.json frontend/sitemap.xml
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "data: Nevada refresh ${DATE} [skip ci]"
          git push

      # --- Deploy to Cloudflare Pages ---
      # Preferred: enable Cloudflare Pages GitHub integration in the dashboard
      # (Settings > Pages > Connect to Git) so every push auto-deploys without
      # any secret or step here.
      #
      # Fallback: uncomment below and add CF_API_TOKEN + CF_ACCOUNT_ID secrets.
      #
      # - name: Deploy to Cloudflare Pages
      #   if: ${{ steps.diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true' }}
      #   run: pnpm dlx wrangler@4.86.0 pages deploy frontend --project-name gov-budget --branch main
      #   env:
      #     CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      #     CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Summary
        if: always()
        env:
          SOURCES_INPUT: ${{ steps.plan.outputs.sources || 'unknown' }}
          PROFILE_INPUT: ${{ steps.plan.outputs.profile || 'unknown' }}
          DRY_RUN_INPUT: ${{ steps.plan.outputs.dry_run || 'false' }}
        run: |
          echo "### Nevada Data Refresh — $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          printf '| Profile | %s |\n' "$PROFILE_INPUT" >> "$GITHUB_STEP_SUMMARY"
          printf '| Dry run | %s |\n' "$DRY_RUN_INPUT" >> "$GITHUB_STEP_SUMMARY"
          echo "| bootstrap.json changed | ${{ steps.diff.outputs.changed || 'unknown' }} |" >> $GITHUB_STEP_SUMMARY
          printf '| Sources filter | %s |\n' "$SOURCES_INPUT" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f frontend/data/bootstrap.json ]; then
            PKGS=$(node -e "const d=JSON.parse(require('fs').readFileSync('frontend/data/bootstrap.json'));console.log(d.summary?.totalPackages||0)")
            BUDGET=$(node -e "const d=JSON.parse(require('fs').readFileSync('frontend/data/bootstrap.json'));console.log(('$'+Math.round((d.summary?.totalBudget||0)/1e9*10)/10+'B'))")
            GEN=$(node -e "const d=JSON.parse(require('fs').readFileSync('frontend/data/bootstrap.json'));console.log(d.sourceMeta?.generatedAt||'unknown')")
            echo "**bootstrap.json stats**: ${PKGS} packages, ${BUDGET}, generated ${GEN}" >> $GITHUB_STEP_SUMMARY
          fi
